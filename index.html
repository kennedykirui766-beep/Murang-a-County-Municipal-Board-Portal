<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Murang'a County Municipal Board Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login">
  <div class="accessibility-bar" id="accessibilityBar">
    <span class="label"><i class="fas fa-universal-access"></i> Accessibility</span>
    <button id="aTextSmall" title="Small text"><i class="fas fa-font"></i> A-</button>
    <button id="aTextDefault" title="Default text"><i class="fas fa-font"></i> A</button>
    <button id="aTextLarge" title="Large text"><i class="fas fa-font"></i> A+</button>
    <button id="aTextXlarge" title="Extra large text"><i class="fas fa-font"></i> A++</button>
    <button id="aSpacingCompact" title="Compact spacing"><i class="fas fa-compress-arrows-alt"></i> ↕</button>
    <button id="aSpacingRelaxed" title="Relaxed spacing"><i class="fas fa-expand-arrows-alt"></i> ↕</button>
    <button id="aSpeech" title="Text to Speech"><i class="fas fa-microphone"></i> Speak</button>
    <button id="aThemeToggle" title="Toggle dark/light mode"><i class="fas fa-moon"></i> Theme</button>
    <button id="aReset" title="Reset accessibility"><i class="fas fa-undo"></i> Reset</button>
  </div>

  <div class="speech-indicator" id="speechIndicator">
    <i class="fas fa-volume-up"></i> Speaking...
    <button id="speechStop" style="background:none;border:none;color:white;cursor:pointer;font-size:1.2rem;">✕</button>
  </div>

  <div id="loginPage">
    <div class="login-card">
      <div class="logo-icon"><i class="fas fa-landmark"></i></div>
      <h1>Murang'a County</h1>
      <p class="subtitle">Municipal Board Portal</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required value="admin@muranga.go.ke" />
        </div>
        <div class="form-group">
          <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required value="admin123" />
        </div>
        <div id="loginError" class="alert alert-danger" style="display:none;">Invalid credentials. Please try again.</div>
        <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Login</button>
      </form>
    </div>
  </div>

  <script src="app_backend.js"></script>
  <!-- Fine Print Footer for Login Page -->

<footer style="text-align: center; padding: 1.5rem; font-size: 0.75rem; color: #666; margin-top: 2rem;">
  <p>&copy; <span id="currentYear"></span> Murang'a County Municipal Board. All rights reserved.</p>
  <p>Unauthorized access or use of this system is strictly prohibited. By logging in, you agree to the <a href="#" style="color: inherit; text-decoration: underline;">Terms of Service</a> and <a href="#" style="color: inherit; text-decoration: underline;">Privacy Policy</a>.</p>
</footer>

<script>
  // Automatically update the year
  document.getElementById('currentYear').textContent = new Date().getFullYear();
</script>
</body>
</html>
